services:
  postgres:
    image: docker.m.daocloud.io/postgres:15-alpine
    container_name: polymind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: polymind
      POSTGRES_PASSWORD: polymind_dev_password
      POSTGRES_DB: polymind
    ports:
      - "5432:5432"
    volumes:
      - polymind-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymind -d polymind"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  polymind-postgres-data:
